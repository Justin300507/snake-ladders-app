services:
  - type: web
    name: snake-ladders-backend
    runtime: python
    buildCommand: pip install -r app/requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: snake-ladders-db
          property: connectionString

databases:
  - name: snake-ladders-db
    plan: free